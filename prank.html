<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сюрприз</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-size: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="message">Готовься...</div>

  <!-- Ваша музыкальная ссылка -->
  <audio id="audio" src="https://rick-roll.skysound7.com/t/114653379131060336858-rick-roll-never-gonna-give-you-up-instrumental/" loop></audio>

  <script>
    (function() {
      const audio = document.getElementById('audio');
      const message = document.getElementById('message');

      audio.volume = 1.0;

      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const source = ctx.createMediaElementSource(audio);
        const gain = ctx.createGain();
        gain.gain.value = 1.0;
        source.connect(gain);
        gain.connect(ctx.destination);
      } catch (e) {}

      const playAudio = () => {
        audio.play().catch(() => {});
      };

      playAudio();

      document.documentElement.requestFullscreen?.();

      setTimeout(() => {
        window.location.href = 'https://www.randomnumber.org';
      }, 5000);

      window.addEventListener('beforeunload', (e) => {
        e.preventDefault();
        e.returnValue = '';
      });

      setTimeout(() => {
        message.textContent = '🎉 Добро пожаловать!';
      }, 1000);
    })();
  </script>
</body>
</html>
